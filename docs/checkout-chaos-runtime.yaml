experiment:
  name: checkout_runtime_gate
  seed: 20260417

load:
  virtualUsers: 20
  workerThreads: 10
  thinkTimeMs: 100

phases:
  - name: baseline
    type: WARMUP
    durationMs: 60000
  - name: payment_fault
    type: FAULT
    durationMs: 120000
  - name: recovery
    type: RECOVERY
    durationMs: 60000

fault:
  exceptionProbability: 0.15
  targetOperations:
    - pay_order
  mode: PARALLEL
  seed: 1337

runtime:
  springControl:
    enabled: true
    baseUrl: http://localhost:8080
    timeoutMs: 3000
    failOnError: true
    disableAllAfterRun: true
    warmupScenarios: [default]
    faultScenarios: [stress]
    recoveryScenarios: [default]

invariants:
  maxErrorRate: 0.03
  maxP95LatencyMs: 800
  noDuplicateOrderIds: true

observability:
  prometheus:
    baseUrl: http://localhost:9090
    timeoutMs: 5000
    checks:
      - name: payment_error_rate_prom
        query: checkout_payment_error_rate
        mode: instant
        operator: <=
        threshold: 0.03
      - name: checkout_p95_latency_prom
        query: checkout_p95_latency_ms
        mode: range
        rangeSeconds: 300
        stepSeconds: 15
        reducer: max
        operator: <=
        threshold: 800
  grafana:
    baseUrl: http://localhost:3000
    apiTokenEnv: GRAFANA_API_TOKEN
    dashboardUid: checkout-dashboard
    panelId: 12
    tags: [chaoslib, checkout]
    annotatePhases: true
    annotateRun: true
    failOnError: false

users:
  steps:
    - operation: create_order
      method: POST
      url: http://localhost:8080/orders?price=100
      successStatusCodes: [200, 201]
      capture:
        orderId: id
    - operation: pay_order
      method: POST
      url: http://localhost:8080/orders/${orderId}/pay
      successStatusCodes: [200]
      emitOrderIdFromSession: orderId
